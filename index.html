<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Tradewatch</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e2e2e7;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --accent: #0071e3;
      --red: #d93025;
      --red-bg: #fdf0ef;
      --blue: #185fa5;
      --blue-bg: #e6f1fb;
      --neutral-bg: #f0f0f5;
      --radius: 18px;
      --radius-sm: 10px;
      --shadow: 0 1px 8px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.04);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text-primary); min-height: 100vh;
    }

    /* Header */
    header {
      background: rgba(255,255,255,0.88);
      backdrop-filter: saturate(180%) blur(24px);
      -webkit-backdrop-filter: saturate(180%) blur(24px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto; height: 54px; padding: 0 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .last-updated { font-size: 12px; color: var(--text-tertiary); }
    .btn-refresh {
      background: none; border: 1px solid var(--border); border-radius: 20px;
      padding: 6px 14px; font-size: 13px; color: var(--accent); cursor: pointer;
      display: flex; align-items: center; gap: 5px; transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-refresh:hover { background: #eaf2fd; }
    .btn-refresh:disabled { opacity: 0.5; cursor: default; }
    .spin { display: inline-block; }
    .spinning { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-icon {
      background: none; border: 1px solid var(--border); border-radius: 50%;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      font-size: 15px; cursor: pointer; color: var(--text-secondary); transition: background 0.15s;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0;
    }
    .btn-icon:hover { background: var(--neutral-bg); }

    /* Main */
    .main { max-width: 1280px; margin: 0 auto; padding: 14px 12px 80px; }
    .status-bar {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
      padding: 9px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; color: var(--text-secondary);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--text-tertiary); }
    .dot.loading { background: #f5a623; animation: pulse 1s infinite; }
    .dot.success { background: #1a9e5c; }
    .dot.error   { background: var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px;
    }

    /* Grid */
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 640px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }

    /* Card */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      position: relative; overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .card::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-top, transparent);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    /* Card summary — always visible, tappable */
    .card-summary {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 14px; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .card-summary:active { background: var(--neutral-bg); }
    .ticker-wrap { display: flex; align-items: center; gap: 8px; }
    .num {
      width: 22px; height: 22px; border-radius: 6px; background: var(--neutral-bg);
      font-size: 10px; font-weight: 700; color: var(--text-tertiary);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ticker { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .summary-right { display: flex; align-items: center; gap: 10px; }
    .price-block { text-align: right; }
    .price-row { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .price { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge.up   { background: #eaf6f0; color: #1a9e5c; }
    .badge.down { background: var(--red-bg); color: var(--red); }
    .badge.flat { background: var(--neutral-bg); color: var(--text-secondary); }
    .prev-price { font-size: 12px; color: var(--text-tertiary); margin-top: 3px; }

    /* Chevron */
    .chevron {
      width: 20px; height: 20px; display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); flex-shrink: 0; transition: transform 0.3s ease;
      font-size: 13px;
    }
    .card.open .chevron { transform: rotate(180deg); }

    /* Expandable detail */
    .card-detail {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease;
      opacity: 0;
    }
    .card.open .card-detail {
      max-height: 800px;
      opacity: 1;
    }
    .card-detail-inner {
      padding: 0 14px 16px;
      border-top: 1px solid var(--border);
    }

    /* Zone sections */
    .zone-section { margin-top: 12px; }
    .zone-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; margin-bottom: 7px;
    }
    .zone-label.s { color: var(--red); }
    .zone-label.r { color: var(--blue); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0 0; }

    /* Column headers */
    .col-headers { display: grid; gap: 4px; padding: 0 8px; margin-bottom: 4px; }
    .col-headers.support-grid { grid-template-columns: 30px 1fr 1fr 1fr; }
    .col-headers.resist-grid  { grid-template-columns: 30px 1fr 1fr; }
    .col-head { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-align: center; }
    .col-head:first-child { text-align: left; }

    /* Level rows */
    .level-row {
      display: grid; gap: 4px; border-radius: 9px;
      padding: 10px 8px; margin-bottom: 5px; align-items: center;
    }
    .level-row:last-child { margin-bottom: 0; }
    .level-row.support-grid { grid-template-columns: 30px 1fr 1fr 1fr; background: var(--red-bg); }
    .level-row.resist-grid  { grid-template-columns: 30px 1fr 1fr; background: var(--blue-bg); }
    .level-tag { font-size: 12px; font-weight: 700; }
    .level-row.support-grid .level-tag { color: var(--red); }
    .level-row.resist-grid  .level-tag { color: var(--blue); }
    .level-val { font-size: 16px; font-weight: 600; text-align: center; letter-spacing: -0.2px; }
    .level-val.muted { color: var(--text-tertiary); font-size: 14px; }

    /* Skeleton */
    .skel {
      background: linear-gradient(90deg,#ebebeb 25%,#f5f5f5 50%,#ebebeb 75%);
      background-size: 800px 100%; animation: shimmer 1.3s infinite; border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }

    /* Modal — bottom sheet on mobile */
    .overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 20px 20px 0 0; padding: 28px 20px 40px;
      width: 100%; max-width: 560px; box-shadow: 0 -8px 40px rgba(0,0,0,0.15);
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border); border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 5px; }
    .modal .msub { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 6px; }
    .fg input {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      padding: 11px 14px; font-size: 15px; font-family: inherit; outline: none;
      transition: border-color 0.15s; -webkit-appearance: none;
    }
    .fg input:focus { border-color: var(--accent); }
    .fg .hint { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; line-height: 1.5; }
    .mbtns { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
    .btn-s {
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer;
      font-family: inherit; width: 100%; -webkit-tap-highlight-color: transparent;
    }
    .btn-s:hover { opacity: 0.88; }
    .btn-c {
      border: 1.5px solid var(--border); background: none; border-radius: var(--radius-sm);
      padding: 13px; font-size: 15px; cursor: pointer; font-family: inherit; width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .placeholder-note { font-size: 12px; color: #f5a623; margin-left: auto; white-space: nowrap; }

    /* Hint text */
    .expand-hint {
      text-align: center; font-size: 12px; color: var(--text-tertiary);
      margin-top: 10px; margin-bottom: 4px; letter-spacing: 0.02em;
    }

    /* Sort bar */
    .sort-bar {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .sort-bar::-webkit-scrollbar { display: none; }
    .sort-label {
      font-size: 11px; font-weight: 600; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
      white-space: nowrap; flex-shrink: 0; margin-right: 2px;
    }
    .sort-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600;
      color: var(--text-secondary); cursor: pointer; white-space: nowrap; flex-shrink: 0;
      display: flex; align-items: center; gap: 4px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent; font-family: inherit;
    }
    .sort-btn:hover { background: var(--neutral-bg); }
    .sort-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Tradewatch<span>IWC</span></div>
    <div class="header-right">
      <span class="last-updated" id="lu"></span>
      <span class="placeholder-note" id="phNote" style="display:none">⚠ Placeholder</span>
      <button class="btn-refresh" id="rbtn" onclick="loadData()">
        <span class="spin" id="spin">↻</span> Refresh
      </button>
      <button class="btn-icon" title="Settings" onclick="openModal()">⚙</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="smsg">Starting…</span>
    <span id="dataDate" style="margin-left:auto;font-size:12px;color:var(--text-tertiary);"></span>
  </div>
  <div class="section-label">Watchlist</div>
  <div class="sort-bar">
    <span class="sort-label">Sort</span>
    <button class="sort-btn" id="sb-default" onclick="setSort('default')">Default</button>
    <button class="sort-btn" id="sb-alpha"   onclick="setSort('alpha')">A–Z</button>
    <button class="sort-btn" id="sb-change-desc" onclick="setSort('change-desc')">% ▲ High</button>
    <button class="sort-btn" id="sb-change-asc"  onclick="setSort('change-asc')">% ▼ Low</button>
    <button class="sort-btn" id="sb-price-desc"  onclick="setSort('price-desc')">Price ▲</button>
    <button class="sort-btn" id="sb-price-asc"   onclick="setSort('price-asc')">Price ▼</button>
  </div>
  <p class="expand-hint">Tap a card to see strategy details</p>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Data Source</h2>
    <p class="msub">Connected to your Google Apps Script. Update the URL here if you redeploy.</p>
    <div class="fg">
      <label>Apps Script URL</label>
      <input id="mi-url" type="url" placeholder="https://script.google.com/macros/s/…/exec"/>
      <div class="hint">Redeploy your script and paste the new URL here if it changes.</div>
    </div>
    <div class="mbtns">
      <button class="btn-s" onclick="saveModal()">Save & Reload</button>
      <button class="btn-c" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const D_URL = "https://script.google.com/macros/s/AKfycbxUcwywAXYIQExhJ4RU3jObdJdoaFH8bYhc5-n9p1FiYQdK4ZDDS-8swhvEOzXYBzRj/exec";

const PH = [
  {no:1,  tk:"BULL", s1:340, s2:320, s3:300, r1:390, r2:416, r3:480, prevPrice:368, price:344,  change:-6.98},
  {no:2,  tk:"IRSX", s1:426, s2:400, s3:370, r1:450, r2:480, r3:505, prevPrice:438, price:418,  change:-4.78},
  {no:3,  tk:"BUMI", s1:214, s2:200, s3:188, r1:230, r2:240, r3:260, prevPrice:226, price:214,  change:-5.61},
  {no:4,  tk:"BEEF", s1:258, s2:240, s3:220, r1:280, r2:300, r3:330, prevPrice:270, price:274,  change:1.46},
  {no:5,  tk:"DEWA", s1:446, s2:420, s3:400, r1:470, r2:500, r3:540, prevPrice:460, price:440,  change:-4.55},
  {no:6,  tk:"INET", s1:260, s2:250, s3:230, r1:290, r2:310, r3:340, prevPrice:274, price:262,  change:-4.58},
  {no:7,  tk:"TOBA", s1:560, s2:520, s3:500, r1:600, r2:630, r3:680, prevPrice:580, price:560,  change:-3.57},
  {no:8,  tk:"BIPI", s1:208, s2:190, s3:176, r1:230, r2:250, r3:276, prevPrice:214, price:199,  change:-7.54},
  {no:9,  tk:"KEEN", s1:880, s2:850, s3:820, r1:920, r2:950, r3:1000,prevPrice:895, price:875,  change:-2.29},
  {no:10, tk:"MINA", s1:248, s2:240, s3:226, r1:276, r2:300, r3:320, prevPrice:268, price:248,  change:-8.06},
];

let cfg = (() => {
  try { const s = localStorage.getItem("tw6"); return s ? JSON.parse(s) : {}; }
  catch { return {}; }
})();
const saveCfg = () => { try { localStorage.setItem("tw6", JSON.stringify(cfg)); } catch {} };

// Gap rule based on level price
function gap(price) {
  if (price < 200)  return 2;
  if (price < 500)  return 4;
  if (price < 2000) return 10;
  if (price < 5000) return 20;
  return 50;
}

async function fetchSheet() {
  const url = cfg.scriptUrl || D_URL;
  const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error("Timeout")), 12000));
  const r = await Promise.race([fetch(url), timeout]);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const json = await r.json();
  if (json.status !== "ok") throw new Error("Script error");
  if (!json.data?.length) throw new Error("No data");
  if (json.lastUpdated) $("dataDate").textContent = `Data as of ${json.lastUpdated}`;
  return json.data.map((row, i) => {
    const num = v => { const n = parseFloat(String(v ?? "").replace(/[%,\s]/g, "")); return isNaN(n) ? null : n; };
    const rawChange = num(row.change);
    const change = rawChange !== null ? (Math.abs(rawChange) <= 1 ? rawChange * 100 : rawChange) : null;
    return {
      no: row.no ?? i+1,
      tk: String(row.ticker||"").trim().toUpperCase(),
      s1: num(row.s1), s2: num(row.s2), s3: num(row.s3),
      r1: num(row.r1), r2: num(row.r2), r3: num(row.r3),
      prevPrice: num(row.prevPrice),
      price: num(row.price),
      change,
    };
  }).filter(r => r.tk);
}

const fmt = n => (n != null && !isNaN(n)) ? parseFloat(n).toLocaleString("id-ID") : null;

function supportRow(tag, levelPrice, nextPrice) {
  if (levelPrice == null) return "";
  const sl = levelPrice - gap(levelPrice);
  const re = nextPrice != null ? nextPrice + gap(nextPrice) : null;
  return `
    <div class="level-row support-grid">
      <span class="level-tag">${tag}</span>
      <span class="level-val">${fmt(levelPrice)}</span>
      <span class="level-val">${fmt(sl)}</span>
      <span class="level-val ${re == null ? "muted" : ""}">${re != null ? fmt(re) : "N/A"}</span>
    </div>`;
}

function resistRow(tag, levelPrice) {
  if (levelPrice == null) return "";
  const entry = levelPrice + gap(levelPrice);
  return `
    <div class="level-row resist-grid">
      <span class="level-tag">${tag}</span>
      <span class="level-val">${fmt(levelPrice)}</span>
      <span class="level-val">${fmt(entry)}</span>
    </div>`;
}

function card(s) {
  const cn  = parseFloat(s.change);
  const dir = isNaN(cn) ? "flat" : cn > 0 ? "up" : cn < 0 ? "down" : "flat";
  const arr = dir==="up" ? "▲" : dir==="down" ? "▼" : "–";
  const sig = dir==="up" ? "+" : "";
  const top = dir==="up" ? "#1a9e5c" : dir==="down" ? "var(--red)" : "var(--border)";
  const priceStr = s.price != null ? parseFloat(s.price).toLocaleString("id-ID") : "—";

  return `
  <div class="card" style="--card-top:${top}" id="card-${s.no}">
    <div class="card-summary" onclick="toggleCard('card-${s.no}')">
      <div class="ticker-wrap">
        <div class="num">${s.no}</div>
        <div class="ticker">${s.tk}</div>
      </div>
      <div class="summary-right">
        <div class="price-block">
          <div class="price-row">
            <div class="badge ${dir}">${arr} ${!isNaN(cn) ? sig+cn.toFixed(2)+"%" : "—"}</div>
            <div class="price">${priceStr}</div>
          </div>
          ${s.prevPrice != null ? `<div class="prev-price">Prev ${parseFloat(s.prevPrice).toLocaleString("id-ID")}</div>` : ""}
        </div>
        <div class="chevron">▾</div>
      </div>
    </div>

    <div class="card-detail">
      <div class="card-detail-inner">
        <div class="zone-section">
          <div class="zone-label s">Support</div>
          <div class="col-headers support-grid">
            <div class="col-head"></div>
            <div class="col-head">Price</div>
            <div class="col-head">Stop Loss</div>
            <div class="col-head">Re-Entry</div>
          </div>
          ${supportRow("S1", s.s1, s.s2)}
          ${supportRow("S2", s.s2, s.s3)}
          ${supportRow("S3", s.s3, null)}
        </div>
        <div class="divider"></div>
        <div class="zone-section">
          <div class="zone-label r">Resistance</div>
          <div class="col-headers resist-grid">
            <div class="col-head"></div>
            <div class="col-head">Price</div>
            <div class="col-head">Entry</div>
          </div>
          ${resistRow("R1", s.r1)}
          ${resistRow("R2", s.r2)}
          ${resistRow("R3", s.r3)}
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle("open");
}

// ── Sort ──────────────────────────────────────────────
let currentSort = "default";
let currentRows = [];

function setSort(mode) {
  currentSort = mode;
  // Update active button
  ["default","alpha","change-desc","change-asc","price-desc","price-asc"].forEach(m => {
    const btn = document.getElementById("sb-" + m);
    if (btn) btn.classList.toggle("active", m === mode);
  });
  renderRows();
}

function sortedRows() {
  const rows = [...currentRows];
  switch (currentSort) {
    case "alpha":
      return rows.sort((a,b) => a.tk.localeCompare(b.tk));
    case "change-desc":
      return rows.sort((a,b) => (b.change ?? -Infinity) - (a.change ?? -Infinity));
    case "change-asc":
      return rows.sort((a,b) => (a.change ?? Infinity) - (b.change ?? Infinity));
    case "price-desc":
      return rows.sort((a,b) => (b.price ?? -Infinity) - (a.price ?? -Infinity));
    case "price-asc":
      return rows.sort((a,b) => (a.price ?? Infinity) - (b.price ?? Infinity));
    default:
      return rows;
  }
}

function renderRows() {
  // Preserve open state
  const openCards = new Set(
    [...document.querySelectorAll(".card.open")].map(el => el.id)
  );
  $("grid").innerHTML = sortedRows().map(r => card(r)).join("");
  // Re-apply open state
  openCards.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add("open");
  });
}

function skeletons(n=4) {
  document.getElementById("grid").innerHTML = Array.from({length:n}).map(()=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 14px;">
        <div style="display:flex;gap:8px;align-items:center">
          <div class="skel" style="width:22px;height:22px;border-radius:6px"></div>
          <div class="skel" style="width:80px;height:26px"></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="text-align:right">
            <div class="skel" style="width:100px;height:26px;margin-bottom:5px"></div>
            <div class="skel" style="width:60px;height:13px"></div>
          </div>
          <div class="skel" style="width:16px;height:16px;border-radius:4px"></div>
        </div>
      </div>
    </div>`).join("");
}

const $ = id => document.getElementById(id);
const setStatus  = (st, msg) => { $("dot").className=`dot ${st}`; $("smsg").textContent=msg; };
const setLoading = on => { $("spin").classList.toggle("spinning",on); $("rbtn").disabled=on; };

async function loadData() {
  setLoading(true);
  setStatus("loading", "Loading from Google Sheets…");
  skeletons();
  $("phNote").style.display = "none";

  let rows, usedPH = false;
  try {
    rows = await fetchSheet();
    if (!rows.length) throw new Error("No data rows");
  } catch(e) {
    console.warn("Sheet failed:", e.message);
    rows = PH; usedPH = true;
    setStatus("error", `Sheet unavailable — showing placeholder (${e.message})`);
    $("phNote").style.display = "block";
  }

  currentRows = rows;
  setSort(currentSort); // re-apply current sort and render
  const now = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  $("lu").textContent = `Updated ${now}`;
  if (!usedPH) {
    const withPrice = rows.filter(r => r.price != null).length;
    setStatus("success", `${rows.length} stocks · ${withPrice} with live price`);
  }
  setLoading(false);
}

function openModal() {
  $("mi-url").value = cfg.scriptUrl || D_URL;
  $("overlay").classList.add("open");
}
function closeModal() { $("overlay").classList.remove("open"); }
function overlayClick(e) { if (e.target.id==="overlay") closeModal(); }
function saveModal() {
  const v = $("mi-url").value.trim();
  cfg = { scriptUrl: v || D_URL };
  saveCfg(); closeModal(); loadData();
}

loadData();
</script>
</body>
</html>
